name: Pull Request

on:
  pull_request:
    branches:
      - main
      - alpha
    paths-ignore:
      - 'scripts/**'

permissions:
  contents: read

jobs:
  build:
    name: 'Build @algorandfoundation/algorand-typescript-testing'
    uses: ./.github/workflows/node-ci.yml
    with:
      pre-test-script: |
        pipx install algokit --python 3.12.6
        algokit localnet reset --update
        pipx install puyapy --python 3.12.6
      node-version: 22.x
      run-build: true
      run-commit-lint: true
      audit-script: npm run audit

  check_docs:
    name: Check docs build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: docs/package.json
      - name: Install root dependencies
        run: npm ci
      - name: Install docs dependencies
        run: pnpm install --frozen-lockfile --dir docs
      - name: Verify documentation builds
        run: pnpm --dir docs build
