name: Publish

on:
  push:
    branches:
      - alpha
      - main
      - release
  workflow_dispatch:

concurrency: release

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  check-puya-ts:
    name: 'Check puya-ts dependency'
    if: github.ref_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 1 }
      - name: Ensure puya-ts dependency is a production release
        run: |
          version=$(npm pkg get dependencies.@algorandfoundation/puya-ts)
          echo "puya-ts version: $version"
          if ! [[ "$version" =~ ^['\"]*[0-9]+\.[0-9]+\.[0-9]+['\"]*$ ]]; then
            echo "::error::puya-ts '$version' is a pre-release; production releases require a stable puya-ts version."
            exit 1
          fi

  build:
    name: 'Build @algorandfoundation/algorand-typescript-testing'
    needs: check-puya-ts
    if: ${{ !failure() && !cancelled() }}
    uses: ./.github/workflows/node-ci.yml
    with:
      pre-test-script: |
        pipx install algokit
        algokit localnet reset --update
        pipx install puyapy
      node-version: 24.x
      run-build: true
      run-commit-lint: true
      audit-script: npm run audit
      upload-artifact-name: algo-ts-testing
      upload-artifact-path: ./dist

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Generate bot token
        uses: actions/create-github-app-token@v3
        id: app_token
        with:
          app-id: ${{ secrets.BOT_ID }}
          private-key: ${{ secrets.BOT_SK }}

      - name: Clone repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - run: npm ci --ignore-scripts

      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          name: algo-ts-testing
          path: artifacts/algo-ts-testing

      - name: Generate semantic version for @algorandfoundation/algorand-typescript-testing
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}

      - name: Publish @algorandfoundation/algorand-typescript-testing
        uses: JS-DevTools/npm-publish@v4
        with:
          package: artifacts/algo-ts-testing/package.json
          access: 'public'
          provenance: true
          tag: ${{ github.ref_name == 'alpha' && 'alpha' || github.ref_name == 'main' && 'beta' || github.ref_name == 'release' && 'latest' || 'pre-release' }}

  publish-docs:
    name: Publish docs
    needs: release
    if: github.ref_name == 'release'
    uses: ./.github/workflows/gh-pages.yml
    permissions:
      contents: read
      pages: write
      id-token: write
