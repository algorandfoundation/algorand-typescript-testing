name: Publish

on:
  push:
    branches:
      - main
      - release
  workflow_dispatch:

concurrency: release

permissions:
  contents: read

jobs:
  check-puya-ts:
    name: 'Check puya-ts dependency'
    if: github.ref_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with: { fetch-depth: 1 }
      - name: Ensure puya-ts dependency is a production release
        run: |
          version=$(npm pkg get dependencies.@algorandfoundation/puya-ts)
          echo "puya-ts version: $version"
          if ! [[ "$version" =~ ^['\"]*[0-9]+\.[0-9]+\.[0-9]+['\"]*$ ]]; then
            echo "::error::puya-ts '$version' is a pre-release; production releases require a stable puya-ts version."
            exit 1
          fi

  check_docs:
    name: 'Check docs'
    if: ${{ !failure() && !cancelled() }}
    uses: algorandfoundation/algokit-shared-config/.github/workflows/check-docs.yml@main

  ci:
    name: CI
    needs:
      - check-puya-ts
      - check_docs
    if: ${{ !failure() && !cancelled() }}
    uses: algorandfoundation/algokit-shared-config/.github/workflows/node-ci.yml@main
    with:
      run-commit-lint: true
      install-algokit: true
      install-puyapy: true
      audit-script: npm run audit

  build:
    name: Build
    needs: ci
    if: ${{ !failure() && !cancelled() }}
    uses: algorandfoundation/algokit-shared-config/.github/workflows/node-build.yml@main
    with:
      build-path: dist
      artifact-name: algo-ts-testing

  release:
    name: Release
    needs: build
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Generate bot token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: app_token
        with:
          app-id: ${{ secrets.BOT_ID }}
          private-key: ${{ secrets.BOT_SK }}

      - name: Clone repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}

      - name: Use Node.js 24.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.x

      - run: npm ci --ignore-scripts

      - name: Download built package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: algo-ts-testing
          path: artifacts/algo-ts-testing

      - name: Generate semantic version for @algorandfoundation/algorand-typescript-testing
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}

      - name: Publish @algorandfoundation/algorand-typescript-testing
        uses: JS-DevTools/npm-publish@0fd2f4369c5d6bcfcde6091a7c527d810b9b5c3f # v4
        with:
          package: artifacts/algo-ts-testing/package.json
          access: 'public'
          provenance: true
          tag: ${{ github.ref_name == 'main' && 'beta' || github.ref_name == 'release' && 'latest' || 'pre-release' }}

  publish_docs:
    name: Publish docs to GitHub Pages
    needs: release
    if: github.ref_name == 'release'
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: algorandfoundation/algokit-shared-config/.github/workflows/publish-docs.yml@main
